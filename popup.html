<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeno CRM</title>
  <style>
    body { width: 280px; padding: 1rem; font-family: system-ui, sans-serif; margin: 0; }
    h2 { font-size: 1rem; margin: 0 0 0.75rem; }
    p { font-size: 0.875rem; color: #666; margin: 0 0 1rem; }
    a { color: #4f46e5; font-size: 0.875rem; }
    button { width: 100%; padding: 0.6rem; background: #4f46e5; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <h2>Zeno CRM</h2>
  <p>Open your CRM in a new tab to manage deals, use AI auto-fill, next actions, and summaries.</p>
  <button id="open-app">Open CRM</button>
  <p style="margin-top: 1rem;"><button id="open-settings" style="width:100%; margin-top:0.5rem; background:transparent; color:#4f46e5; border:1px solid #4f46e5;">Settings (Gemini API key)</button></p>
  <script src="popup.js"></script>
</body>
</html>
